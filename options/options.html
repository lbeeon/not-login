<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Not Login — Settings</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #1a1a1a;
      color: #e0e0e0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 14px;
      padding: 40px;
      min-height: 100vh;
    }

    h1 {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 28px;
      color: #f0f0f0;
    }

    .field {
      margin-bottom: 18px;
    }

    label {
      display: block;
      font-size: 12px;
      color: #888;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.6px;
    }

    input[type="text"] {
      width: 420px;
      max-width: 100%;
      background: #242424;
      border: 1px solid #333;
      color: #e0e0e0;
      padding: 8px 12px;
      border-radius: 5px;
      font-size: 14px;
      outline: none;
      font-family: monospace;
    }

    input[type="text"]:focus {
      border-color: #4a7ab5;
    }

    .hint {
      font-size: 11px;
      color: #555;
      margin-top: 5px;
    }

    .actions {
      display: flex;
      gap: 10px;
      margin-top: 24px;
    }

    button {
      background: #252525;
      border: 1px solid #3a3a3a;
      color: #ccc;
      padding: 8px 18px;
      border-radius: 5px;
      cursor: pointer;
      font-size: 13px;
      font-family: inherit;
      transition: background 0.1s;
    }

    button:hover {
      background: #303030;
      color: #e0e0e0;
    }

    #save {
      background: #1e4a7a;
      border-color: #2a5d99;
      color: #cde;
    }

    #save:hover {
      background: #245a92;
    }

    #status {
      margin-top: 18px;
      font-size: 13px;
      min-height: 20px;
    }

    #status.success { color: #6abf69; }
    #status.error   { color: #d06060; }
    #status.info    { color: #888; }
  </style>
</head>
<body>
  <h1>Not Login Settings</h1>

  <div class="field">
    <label for="sheetId">Google Sheet ID</label>
    <input id="sheetId" type="text" placeholder="1BxiMVs0XRA5nFMdKvBdBZjgmUUqptlbs74OgVE2upms">
    <div class="hint">Found in the URL: docs.google.com/spreadsheets/d/<strong>SHEET_ID</strong>/edit</div>
  </div>

  <div class="field">
    <label for="tabName">Tab name</label>
    <input id="tabName" type="text" placeholder="secrets">
    <div class="hint">The sheet tab containing your secrets (default: secrets)</div>
  </div>

  <div class="actions">
    <button id="test">Test connection</button>
    <button id="save">Save</button>
  </div>

  <div id="status"></div>

  <script src="options.js"></script>
</body>
</html>
