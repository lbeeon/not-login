<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div id="app">
    <header>
      <span class="title" id="header-title">Not Login</span>
      <div class="header-actions" id="header-main">
        <button id="add-btn" class="icon-btn" title="Add secret">+</button>
        <button id="refresh-btn" class="icon-btn" title="Refresh">↻</button>
        <button id="settings-btn" class="icon-btn" title="Settings">⚙</button>
      </div>
      <div class="header-actions" id="header-settings" style="display:none">
        <button id="back-btn" class="icon-btn" title="Back">←</button>
      </div>
    </header>

    <!-- ── Main view ── -->
    <div id="main-view">
      <div id="add-form">
        <div id="form-label"></div>
        <div class="form-row">
          <label for="type-select">type</label>
          <select id="type-select">
            <option value="general">general</option>
            <option value="website">website</option>
          </select>
        </div>
        <div class="form-row" id="category-row">
          <label for="category-input">category</label>
          <input id="category-input" type="text" placeholder="wifi, bank...">
        </div>
        <div class="form-row">
          <label for="key-input">key</label>
          <input id="key-input" type="text" placeholder="github.com">
        </div>
        <div class="form-row">
          <label for="username-input">username</label>
          <input id="username-input" type="text">
        </div>
        <div class="form-row">
          <label for="secret-input">secret</label>
          <input id="secret-input" type="password">
        </div>
        <div class="form-row">
          <label for="notes-input">notes</label>
          <input id="notes-input" type="text">
        </div>
        <div class="form-error" id="form-error"></div>
        <div class="form-actions">
          <button id="cancel-btn" class="btn">Cancel</button>
          <button id="save-btn" class="btn btn-primary">Save</button>
        </div>
      </div>

      <div class="search-row">
        <input id="search" type="text" placeholder="Search...">
      </div>

      <div id="filter-chips"></div>

      <div id="status"></div>
      <div id="list"></div>
    </div>

    <!-- ── Settings view ── -->
    <div id="settings-view" style="display:none">
      <div class="settings-body">

        <!-- Vault connected -->
        <div id="vault-connected" style="display:none">
          <div class="vault-section-label">Vault</div>
          <div class="vault-info">
            <span class="vault-check">✓</span>
            <span id="vault-title-display"></span>
          </div>
          <div class="vault-btns">
            <a id="vault-open-link" class="btn" href="#" target="_blank">Open ↗</a>
            <button id="vault-change" class="btn">Change</button>
          </div>
        </div>

        <!-- Vault setup -->
        <div id="vault-setup" style="display:none">
          <button id="cfg-create" class="btn btn-primary btn-full">Create new vault</button>
          <div id="vault-list-section" style="display:none">
            <div class="vault-list-label">or reconnect existing</div>
            <div id="vault-list"></div>
          </div>
        </div>

        <div id="cfg-status"></div>

        <!-- Autofill toggle -->
        <div class="field field-toggle">
          <label for="cfg-autofill" class="toggle-row">
            <span class="toggle-text">Autofill on websites</span>
            <span class="toggle-wrap">
              <input type="checkbox" id="cfg-autofill">
              <span class="toggle-track"></span>
            </span>
          </label>
          <div class="field-hint">Show icon next to password fields (off by default)</div>
        </div>

        <div class="settings-kofi">
          <a href="https://ko-fi.com/lbeeon" target="_blank">☕ Support development</a>
        </div>
      </div>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
